name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.REGISTRY_HOST }}/focusguard/backend:staging -f backend/Dockerfile .
          docker push ${{ secrets.REGISTRY_HOST }}/focusguard/backend:staging

      - name: Deploy to Kubernetes (staging)
        env:
          KUBECONFIG: ${{ secrets.STAGING_KUBECONFIG }}
        run: |
          echo "$KUBECONFIG" > kubeconfig
          export KUBECONFIG=$(pwd)/kubeconfig
          kubectl set image deployment/focusguard-backend focusguard-backend=${{ secrets.REGISTRY_HOST }}/focusguard/backend:staging --namespace=staging || kubectl apply -f k8s -n staging
