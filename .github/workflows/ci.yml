name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r backend/requirements.txt --fail-on high

      - name: Run ruff (lint)
        run: |
          ruff check backend || true

      - name: Run backend tests
        working-directory: .
        run: |
          python -m pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build extension
        working-directory: extension
        run: |
          npm ci
          npm audit --audit-level=high
          npm run build

  extension-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install extension dev dependencies
        working-directory: extension
        run: |
          npm ci

      - name: Run ESLint on extension
        working-directory: extension
        run: |
          npm run lint
          npm audit --audit-level=high
          npm run typecheck
