services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: focusguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/focusguard
      JWT_SECRET: change-me
      CORS_ORIGINS: http://localhost:3000,chrome-extension://*
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  pgdata:
