apiVersion: apps/v1
kind: Deployment
metadata:
  name: focusguard-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: focusguard-backend
  template:
    metadata:
      labels:
        app: focusguard-backend
    spec:
      containers:
        - name: backend
          image: registry.example.com/focusguard/backend:latest
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
